version: '3.8'

services:
    db:
        image: postgis/postgis:15-3.3
        container_name: geodurak_db_container
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: umut
            POSTGRES_PASSWORD: durak123
            POSTGRES_DB: geodurak_db
        volumes:
            - postgres_data:/var/lib/postgresql/data

    redis:
        image: redis:7-alpine
        container_name: geodurak_redis_container
        ports:
            - "6379:6379"

volumes:
    postgres_data:
